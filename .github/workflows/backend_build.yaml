name: FastAPI CI

# Only triggers if there is a backend change
on:
  push:
    paths: 
      - 'backend/**'
      - '.github/workflows/backend_build.yml'
    branches: ["main", "dev"]
    
  pull_request:
    paths: 
      - 'backend/**'
      - '.github/workflows/backend_build.yml'
    branches: ["dev", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.13]

    env:
      MODE: "dev"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
      TAVILY_API_KEY: ${{secrets.TAVILY_API_KEY}}
      STORAGE_BUCKET: ${{secrets.STORAGE_BUCKET}}
      FIREBASE_CRED: ${{vars.FIREBASE_JSON_PATH}}

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python-version}}

      

      - name: Debug Check Directory
        run: |
          pwd
          mkdir -p secrets
      - name: Decode Firebase credentials
        working-directory: ./backend
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_JSON }}' > ${{vars.FIREBASE_JSON_PATH}}
          cd secrets
          ls -l

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install dependencies
        run: poetry install
        working-directory: ./backend

      - name: Show pydantic version
        run: poetry run python -c "import pydantic; print('Pydantic =', pydantic.__version__)"
        working-directory: ./backend
      - name: Run Test
        run: |
          poetry run python -m pytest 
        working-directory: ./backend
