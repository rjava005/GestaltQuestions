name: GestaltQuestions BACKEND DEV CI

# Only triggers if there is a backend change
on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend**"
    # branches: ["main", "dev"]

  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend**"
    # branches: ["dev", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.11, 3.12, 3.13]

    env:
      MODE: "dev"
      STORAGE_BUCKET: ${{secrets.STORAGE_BUCKET}}
      FIREBASE_CRED: ${{vars.FIREBASE_JSON_PATH}}
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      STORAGE_EMULATOR_HOST: http://localhost:9199

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python-version}}

      # Install python dependencies
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install dependencies
        run: poetry install
        working-directory: ./backend

      # Install JAVA for the firebase
      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Verify Java installation
        run: java -version

      # Setup firebase and firebase emulator
      - name: Decode Firebase credentials
        working-directory: ./backend
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_JSON }}' > ${{vars.FIREBASE_JSON_PATH}}
          cd secrets
          ls -l
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Create firebase.json
        run: |
          cat <<EOF > firebase.json
          {
            "emulators": {
              "singleProjectMode": true,
              "auth": {
                "port": 9099
              },
              "storage": {
                "port": 9199
              },
              "ui": {
                "enabled": true,
                "port": 4000
              }
            },
            "storage": {
              "rules": "storage.rules"
            }
          }
          EOF
      - name: Write firebase rules
        run: |
          cat <<EOF > storage.rules
          rules_version = '2';

          // Craft rules based on data in your Firestore database
          // allow write: if firestore.get(
          //    /databases/(default)/documents/users/$(request.auth.uid)).data.isAdmin;
          service firebase.storage {
            match /b/{bucket}/o {
              match /{allPaths=**} {
                allow read, write: if false;
              }
            }
          }
          EOF
      - name: Start firebase emulator
        run: firebase emulators:start --only auth,storage --project demo-test & sleep 10

      # - name: Run Test
      #   run: |
      #     poetry run python -m pytest
      #   working-directory: ./backend
